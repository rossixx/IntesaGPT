<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>intesagpt_beta</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

    <div id="menuScreen" class="screen-container">
        <h1>Intesa GPT</h1>
        <div class="menu-buttons">
            <button id="singleBtn">Gioca da solo</button>
            <button id="multiBtn">Multigiocatore</button>
        </div>
    </div>

    <div id="setupScreen" class="screen-container hidden">
        <h2>Imposta le Squadre</h2>
        <div class="setup-inputs">
            <input type="text" id="team1Input" placeholder="Nome Squadra 1">
            <input type="text" id="team2Input" placeholder="Nome Squadra 2">
        </div>
        <button id="startMatchBtn">Inizia Partita</button>
        <button id="backToMenuBtn">Torna al Menu</button>
    </div>

    <div id="gameScreen" class="screen-container hidden">
        
        <h2 id="turnDisplay" class="multiplayer-only">Turno: <span id="currentTeam">Squadra 1</span></h2>

        <div id="timerDisplay" class="timer">59</div>

        <div id="wordDisplay"></div>

        <div class="teams-container">
            <div class="team-score multiplayer-only">
                <h3 id="team1Name">Squadra 1</h3>
                <p id="team1Score">0</p>
            </div>

            <div class="team-score multiplayer-only">
                <h3 id="team2Name">Squadra 2</h3>
                <p id="team2Score">0</p>
            </div>
        </div>

        <div class="controls">
            <button id="newWordBtn">🎲 NUOVA</button>
            <button id="toggleDoubleBtn">RADDOPPIA</button>
            <button id="respondBtn">🔴 RISPONDI</button>
            <button id="correctBtn">✅ GIUSTA</button>
            <button id="wrongBtn">❌ SBAGLIATA</button>
            <button id="passBtn">⏭ PASSO</button>
            <button id="changeTurnBtn">🔄 CAMBIA TURNO</button>
        </div>

        <ul id="historyList" class="hidden"></ul>

    </div>

    <div id="winnerScreen" class="screen-container hidden">
        <h2>Ha vinto: <span id="winnerName"></span>!</h2>
        <div class="menu-buttons">
            <button id="playAgainBtn">Gioca di nuovo</button>
        </div>
    </div>
    
<script src="data/words.js"></script>
<script src="data/phrases.js"></script>
<script src="js/app.js"></script>
<script src="js/game.js"></script>

</body>

</body>
</html>
